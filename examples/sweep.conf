# Full run configuration. Values in [sweep] are engine serving parameters.
engine = vllm
model = Qwen/Qwen3-4B-Instruct-2507
gpus = 2
metric = tps
max_model_len = 8192
results_dir = .optimum-advisor/results

[benchmark]
num_prompts = 4
request_rate = 1
max_concurrency = 1

[sweep]
tensor-parallel-size = 1,2
gpu-memory-utilization = 0.80,0.90
# max-num-batched-tokens = 4096,8192
