# Single benchmark configuration. No [sweep] section: this is one exact bench.
engine = vllm
model = Qwen/Qwen3-4B-Instruct-2507
gpus = 1
metric = tps
max_model_len = 8192
results_dir = .optimum-advisor/results

[benchmark]
num_prompts = 4
request_rate = 1
max_concurrency = 1

[serve]
tensor-parallel-size = 1
gpu-memory-utilization = 0.90
max-model-len = 8192
max-num-batched-tokens = 8192
