# Single SGLang benchmark configuration. Good for smoke-testing the SGLang path.
engine = sglang
model = Qwen/Qwen3-4B-Instruct-2507
gpus = 1
metric = tps
max_model_len = 8192
results_dir = .optimum-advisor/results

[benchmark]
num_prompts = 4
request_rate = 1
max_concurrency = 1
random_input_len = 1024
random_output_len = 128

[serve]
tp-size = 1
mem-fraction-static = 0.88
chunked-prefill-size = 8192
max-running-requests = 1
