name: Release-plz

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force:
        description: >-
          Open the release PR even when no commit matches release_commits
          (e.g. to cut a release containing only docs or tooling changes).
        type: boolean
        default: false

permissions: {}

jobs:
  release:
    name: Tag and publish pending release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    concurrency:
      group: release-plz-release
      cancel-in-progress: false
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Install stable Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
      - name: Run release-plz release
        id: release
        uses: release-plz/action@2eb1d8bcb770b4c48ccfaad919734b38b51958c9 # v0.5.131
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Dispatch the binary build for each new release
        # Tags created with GITHUB_TOKEN do not fire `on: push: tags:`
        # workflows (anti-recursion), so trigger the binary workflow through
        # workflow_dispatch, which GITHUB_TOKEN is allowed to start.
        if: steps.release.outputs.releases_created == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASES: ${{ steps.release.outputs.releases }}
        run: |
          set -eu
          printf '%s' "$RELEASES" | jq -r '.[].tag' | while read -r tag; do
            [ -n "$tag" ] || continue
            gh workflow run release.yml --repo "$GITHUB_REPOSITORY" --ref main -f "tag=$tag"
          done

  release-pr:
    name: Open or update the release PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-pr
      cancel-in-progress: false
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Install stable Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
      - name: Drop the release gate for forced runs
        # `release_commits` only sees commits that touch files, so an empty
        # commit cannot force a release. Instead, a manual dispatch with
        # `force=true` runs release-pr against an out-of-tree copy of the
        # config without the gate; the checkout stays clean, so the release
        # PR never contains the modified config.
        if: github.event_name == 'workflow_dispatch' && inputs.force
        run: sed '/^release_commits/d' release-plz.toml > "$RUNNER_TEMP/release-plz-forced.toml"
      - name: Run release-plz release-pr
        uses: release-plz/action@2eb1d8bcb770b4c48ccfaad919734b38b51958c9 # v0.5.131
        with:
          command: release-pr
          config: ${{ (github.event_name == 'workflow_dispatch' && inputs.force) && format('{0}/release-plz-forced.toml', runner.temp) || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
