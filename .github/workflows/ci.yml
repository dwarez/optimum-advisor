name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Stable quality gates
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install stable Rust
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy
          rustup default stable
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Lint all targets
        run: cargo clippy --all-targets --all-features --locked -- -D warnings
      - name: Test all targets
        run: cargo test --all-targets --all-features --locked
      - name: Build release binary
        run: cargo build --release --all-features --locked

  msrv:
    name: Rust 1.85.0
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install declared MSRV
        run: rustup toolchain install 1.85.0 --profile minimal
      - name: Check all targets on MSRV
        run: cargo +1.85.0 check --all-targets --all-features --locked
      - name: Test all targets on MSRV
        run: cargo +1.85.0 test --all-targets --all-features --locked

  security-and-scripts:
    name: Security and maintained scripts
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install stable Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
      - name: Audit Rust dependencies
        run: |
          cargo install cargo-audit --version 0.22.2 --locked
          cargo audit
      - name: Check shell syntax
        run: sh -n scripts/install.sh scripts/setup-correctness-env.sh
      - name: Check embedded Python syntax
        env:
          PYTHONPYCACHEPREFIX: ${{ runner.temp }}/optimum-advisor-pycache
        run: >-
          python3 -m py_compile
          src/python/capability_probes.py
          src/python/inspect_vllm_args.py
          src/python/inspect_sglang_args.py
          tests/fixtures/fake_server.py
      - name: Lint maintained shell scripts
        run: shellcheck scripts/install.sh scripts/setup-correctness-env.sh
